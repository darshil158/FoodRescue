<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Premium Gradient Definitions -->
    <linearGradient id="leafGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0b2a1a" />
      <stop offset="50%" stop-color="#2d8653" />
      <stop offset="100%" stop-color="#5ec285" />
    </linearGradient>
    <linearGradient id="handGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5921e" />
      <stop offset="100%" stop-color="#f7aa4a" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base Container -->
  <rect width="100" height="100" rx="22" fill="#0b2a1a" />
  
  <!-- Outer glowing rings -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(94, 194, 133, 0.08)" stroke-width="2" />
  <circle cx="50" cy="50" r="38" fill="none" stroke="rgba(94, 194, 133, 0.15)" stroke-width="1.5" stroke-dasharray="4 4" />

  <!-- The Leaf (Surplus food / organic element) -->
  <path d="M 50 18 C 72 32, 76 60, 50 78 C 24 60, 28 32, 50 18 Z" fill="url(#leafGrad)" />
  
  <!-- Center Leaf Vein -->
  <path d="M 50 18 Q 50 50, 50 78" stroke="rgba(255, 255, 255, 0.25)" stroke-width="2" stroke-linecap="round" fill="none" />
  
  <!-- Side Vein accents -->
  <path d="M 50 35 Q 60 42, 65 40" stroke="rgba(255, 255, 255, 0.18)" stroke-width="1.5" stroke-linecap="round" fill="none" />
  <path d="M 50 48 Q 62 58, 63 55" stroke="rgba(255, 255, 255, 0.18)" stroke-width="1.5" stroke-linecap="round" fill="none" />
  <path d="M 50 35 Q 40 42, 35 40" stroke="rgba(255, 255, 255, 0.18)" stroke-width="1.5" stroke-linecap="round" fill="none" />
  <path d="M 50 48 Q 38 58, 37 55" stroke="rgba(255, 255, 255, 0.18)" stroke-width="1.5" stroke-linecap="round" fill="none" />

  <!-- The Supporting Hand (Rescue/volunteer action) -->
  <path d="M 28 72 C 32 64, 45 68, 50 74 C 55 68, 68 64, 72 72 C 70 82, 60 84, 50 84 C 40 84, 30 82, 28 72 Z" fill="url(#handGrad)" />
  
  <!-- Small glowing seed/heart of impact -->
  <circle cx="50" cy="50" r="5" fill="#f5921e" filter="url(#glow)" />
</svg>
