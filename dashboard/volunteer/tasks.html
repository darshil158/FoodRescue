<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Tasks — Volunteer Dashboard</title>
  <meta name="robots" content="noindex">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/dashboard.css">
  <link rel="stylesheet" href="../../assets/css/animations.css">
</head>
<body class="dash-body">

<div id="toast-container"></div>

<!-- Sidebar Toggle (Mobile) -->
<button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
  <i class="bi bi-list"></i>
</button>

<!-- Sidebar -->
<aside class="dash-sidebar" id="dashSidebar">
  <div class="sidebar-header">
    <a href="../../index.html" class="sidebar-logo">
      <div class="logo-icon">🍃</div>
      <span>FoodRescue</span>
    </a>
    <div class="sidebar-user">
      <div class="sidebar-avatar">
        <i class="bi bi-person"></i>
      </div>
      <div>
        <div class="sidebar-user-name">Ramesh Kumar</div>
        <div class="sidebar-user-role">
          <span class="verified-dot"></span>
          <span>🌱 Seedling</span>
        </div>
      </div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="sidebar-section-label">Main Menu</div>
    <a href="index.html"   class="sidebar-nav-link"><i class="bi bi-grid-3x3-gap"></i> Dashboard</a>
    <a href="tasks.html"   class="sidebar-nav-link active"><i class="bi bi-lightning-charge"></i> My Tasks <span class="nav-badge" id="taskBadge">1</span></a>
    <a href="scan.html"    class="sidebar-nav-link"><i class="bi bi-qr-code-scan"></i> Scan QR</a>
    <a href="history.html" class="sidebar-nav-link"><i class="bi bi-clock-history"></i> History</a>
    <a href="rewards.html" class="sidebar-nav-link"><i class="bi bi-trophy"></i> Rewards</a>
    <div class="sidebar-section-label">Account</div>
    <a href="profile.html" class="sidebar-nav-link"><i class="bi bi-person-circle"></i> Profile</a>
  </nav>

  <div class="sidebar-footer">
    <button class="sidebar-logout" data-logout>
      <i class="bi bi-box-arrow-left"></i> Logout
    </button>
  </div>
</aside>

<!-- Main Content -->
<main class="dash-main">
  <!-- Top Bar -->
  <div class="dash-topbar">
    <div>
      <div class="dash-greeting">Active Missions</div>
      <div class="dash-date" id="dateText"></div>
    </div>
  </div>

  <div class="dash-content">
    <div class="row g-4">
      
      <!-- Tasks list -->
      <div class="col-lg-6">
        <div class="dash-table-card">
          <div class="dash-table-header">
            <div class="dash-table-title">My Accepted Shipments</div>
          </div>
          <div style="padding:1rem 0;" id="volunteerTasksFeed">
            <!-- Rendered dynamically -->
          </div>
        </div>
      </div>

      <!-- Navigation & Guide -->
      <div class="col-lg-6">
        <div class="dash-chart-card h-100" style="display:flex; flex-direction:column;">
          <div class="dash-chart-title">Route Navigation Helper</div>
          <div id="routeDetails" style="margin-bottom:1.5rem;">
            <div style="text-align:center; color:var(--dash-muted); padding:2rem;">Select a task to get directions</div>
          </div>

          <!-- Mock GPS Nav Area -->
          <div style="flex:1; min-height:260px; background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.06); border-radius:var(--radius-lg); display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden;">
            <div style="text-align:center; color:var(--dash-muted); z-index:2;" id="gpsMsg">
              <i class="bi bi-compass" style="font-size:2rem; display:block; margin-bottom:0.5rem; color:var(--saffron-400);"></i>
              Compass Map Ready. Select task above.
            </div>
            <!-- Mock route overlay -->
            <div id="mockNavMap" style="display:none; position:absolute; inset:0; background: radial-gradient(circle at 30% 70%, rgba(61,166,104,0.1), transparent 90%);">
              <div style="position:absolute; bottom:15%; left:25%; font-size:1.5rem;" title="Restaurant Pickup">🏪</div>
              <div style="position:absolute; top:25%; right:25%; font-size:1.5rem;" title="NGO Destination">🏢</div>
              <div id="gpsDot" style="position:absolute; bottom:15%; left:25%; width:12px; height:12px; background:var(--saffron-400); border-radius:50%; box-shadow:0 0 10px var(--saffron-400); transition:all 2s ease-in-out;"></div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { initDashboardSidebar, initLogout } from '../../assets/js/ui.js';
  import { showToast } from '../../assets/js/notifications.js';

  initDashboardSidebar();
  initLogout();
  document.getElementById('dateText').textContent = new Date().toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long' });

  const tasks = [
    { id: 't1', foodName: 'Veg Biryani Extra Packets', qty: '60 kg', servings: 80, restaurant: "Patel's Hotel", restaurantAddr: 'Railway St, Nanpura, Surat', ngo: 'Asha Foundation', ngoAddr: 'Nehru Garden Road, Surat', status: 'pickup_en_route', points: 50 },
    { id: 't2', foodName: 'Fresh Breads & Cakes', qty: '12 boxes', servings: 40, restaurant: 'Golden Bakery', restaurantAddr: 'Main Chowk, Nanpura, Surat', ngo: 'Seva Ashram', ngoAddr: 'Adajan Rd, Surat', status: 'assigned', points: 40 }
  ];

  let selectedTaskId = null;

  function renderTasks() {
    const feed = document.getElementById('volunteerTasksFeed');
    feed.innerHTML = tasks.map(t => `
      <div class="donation-feed-card mx-3 mb-3 cursor-pointer ${selectedTaskId === t.id ? 'active-donation-card' : ''}" onclick="selectTask('${t.id}')">
        <div class="donation-food-img">🛵</div>
        <div style="flex:1;">
          <div class="donation-feed-title">${t.foodName}</div>
          <div class="donation-feed-meta">
            <span>🏪 From: ${t.restaurant}</span>
            <span>🏢 To: ${t.ngo}</span>
          </div>
          <div style="margin-top:6px;"><span class="status-badge status-${t.status}">${t.status.replace(/_/g, ' ')}</span></div>
        </div>
        <div style="display:flex; flex-direction:column; justify-content:center; align-items:flex-end;">
          <strong style="color:var(--saffron-400); font-size:var(--text-sm);">+${t.points} pts</strong>
        </div>
      </div>
    `).join('');

    document.getElementById('taskBadge').textContent = tasks.length;
  }

  window.selectTask = function(id) {
    selectedTaskId = id;
    renderTasks();
    const task = tasks.find(t => t.id === id);
    if (!task) return;

    // Display routing steps
    const details = document.getElementById('routeDetails');
    details.innerHTML = `
      <div style="background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.06); border-radius:var(--radius-md); padding:1rem;">
        <div style="font-size:var(--text-xs); color:var(--dash-muted); margin-bottom:0.25rem;">STEP 1: PICKUP</div>
        <div style="font-family:var(--font-heading); font-weight:700; color:var(--white);">${task.restaurant}</div>
        <div style="font-size:var(--text-xs); color:var(--dash-text); margin-bottom:1rem;">📍 ${task.restaurantAddr}</div>

        <div style="font-size:var(--text-xs); color:var(--dash-muted); margin-bottom:0.25rem;">STEP 2: DELIVERY TARGET</div>
        <div style="font-family:var(--font-heading); font-weight:700; color:var(--white);">${task.ngo}</div>
        <div style="font-size:var(--text-xs); color:var(--dash-text); margin-bottom:1rem;">📍 ${task.ngoAddr}</div>
        
        <div style="display:flex; gap:8px;">
          <a href="scan.html?type=${task.status === 'pickup_en_route' ? 'pickup' : 'delivery'}" class="btn btn-green btn-sm flex-1"><i class="bi bi-qr-code-scan"></i> Scan Verification QR</a>
          <button class="btn btn-outline-green btn-sm" onclick="simulateGpsMove()"><i class="bi bi-play-circle"></i> Nav Assist</button>
        </div>
      </div>
    `;

    document.getElementById('gpsMsg').style.display = 'none';
    document.getElementById('mockNavMap').style.display = 'block';
  };

  window.simulateGpsMove = function() {
    const dot = document.getElementById('gpsDot');
    if (!dot) return;
    showToast('Navigating Route', 'Simulating GPS coordinate movement along nano-grid routes.', 'info');
    dot.style.bottom = '75%';
    dot.style.left = '70%';
  };

  renderTasks();
</script>

<style>
  .active-donation-card {
    background: rgba(255, 255, 255, 0.03);
    border-left: 3px solid var(--green-400);
  }
</style>

</body>
</html>
