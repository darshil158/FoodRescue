<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beneficiaries — NGO Dashboard</title>
  <meta name="robots" content="noindex">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/dashboard.css">
  <link rel="stylesheet" href="../../assets/css/animations.css">
</head>
<body class="dash-body">

<div id="toast-container"></div>

<!-- Sidebar Toggle (Mobile) -->
<button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
  <i class="bi bi-list"></i>
</button>

<!-- Sidebar -->
<aside class="dash-sidebar" id="dashSidebar">
  <div class="sidebar-header">
    <a href="../../index.html" class="sidebar-logo">
      <div class="logo-icon">🍃</div>
      <span>FoodRescue</span>
    </a>
    <div class="sidebar-user">
      <div class="sidebar-avatar">
        <i class="bi bi-building"></i>
      </div>
      <div>
        <div class="sidebar-user-name">Asha Foundation</div>
        <div class="sidebar-user-role">
          <span class="verified-dot"></span>
          <span>Registered NGO</span>
        </div>
      </div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="sidebar-section-label">Main Menu</div>
    <a href="index.html"    class="sidebar-nav-link"><i class="bi bi-grid-3x3-gap"></i> Overview</a>
    <a href="incoming.html" class="sidebar-nav-link"><i class="bi bi-inbox"></i> Incoming <span class="nav-badge" id="incomingBadge">3</span></a>
    <a href="active.html"   class="sidebar-nav-link"><i class="bi bi-lightning-charge"></i> Active</a>
    <a href="history.html"  class="sidebar-nav-link"><i class="bi bi-clock-history"></i> History</a>
    <a href="beneficiaries.html" class="sidebar-nav-link active"><i class="bi bi-people"></i> Beneficiaries</a>
    <div class="sidebar-section-label">Account</div>
    <a href="profile.html"  class="sidebar-nav-link"><i class="bi bi-person-circle"></i> Profile</a>
  </nav>

  <div class="sidebar-footer">
    <button class="sidebar-logout" data-logout>
      <i class="bi bi-box-arrow-left"></i> Logout
    </button>
  </div>
</aside>

<!-- Main Content -->
<main class="dash-main">
  <!-- Top Bar -->
  <div class="dash-topbar">
    <div>
      <div class="dash-greeting">Manage Beneficiaries</div>
      <div class="dash-date" id="dateText"></div>
    </div>
    <div class="dash-topbar-actions">
      <button class="btn btn-primary btn-sm" onclick="openAddBeneficiaryModal()"><i class="bi bi-plus-circle"></i> Add Beneficiary Center</button>
    </div>
  </div>

  <div class="dash-content">
    
    <!-- Beneficiary cards grid -->
    <div class="row g-4" id="beneficiaryGrid">
      <!-- Loaded dynamically -->
    </div>

  </div>
</main>

<!-- Add / Edit Beneficiary Modal -->
<div class="confirm-modal-overlay" id="beneficiaryModal">
  <div class="confirm-modal">
    <h4 style="font-family:var(--font-heading); font-weight:700; margin-bottom:1rem;" id="modalTitle">Add Beneficiary Center</h4>
    
    <div class="form-field">
      <label class="form-label" for="centerName">Center Name <span class="required">*</span></label>
      <input type="text" id="centerName" class="form-input" placeholder="e.g. St. Jude Orphanage">
    </div>

    <div class="form-field">
      <label class="form-label" for="centerType">Center Type</label>
      <select id="centerType" class="form-input">
        <option value="Orphanage">Orphanage</option>
        <option value="Old Age Home">Old Age Home</option>
        <option value="Community Kitchen">Community Kitchen</option>
        <option value="Slum Area Outreach">Slum Area Outreach</option>
      </select>
    </div>

    <div class="form-field">
      <label class="form-label" for="centerCapacity">Daily Meals Needed <span class="required">*</span></label>
      <input type="number" id="centerCapacity" class="form-input" value="40">
    </div>

    <div class="form-field">
      <label class="form-label" for="centerAddress">Address</label>
      <input type="text" id="centerAddress" class="form-input" placeholder="Nanpura, Surat">
    </div>

    <div style="display:flex; gap:1rem; margin-top:2rem;">
      <button class="btn btn-outline-green flex-1" onclick="closeBeneficiaryModal()">Cancel</button>
      <button class="btn btn-green flex-1" onclick="saveBeneficiary()">Save Center</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { initDashboardSidebar, initLogout } from '../../assets/js/ui.js';
  import { showToast } from '../../assets/js/notifications.js';

  initDashboardSidebar();
  initLogout();
  document.getElementById('dateText').textContent = new Date().toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long' });

  const beneficiaries = [
    { id: 'b1', name: 'St. Jude Orphanage', type: 'Orphanage', capacity: 45, address: 'Nanpura, Surat', active: true },
    { id: 'b2', name: 'Happy Old Age Home', type: 'Old Age Home', capacity: 35, address: 'Adajan, Surat', active: true },
    { id: 'b3', name: 'Katargam Slum Outreach', type: 'Slum Area Outreach', capacity: 80, address: 'Katargam GIDC, Surat', active: true }
  ];

  function renderBeneficiaries() {
    const grid = document.getElementById('beneficiaryGrid');
    grid.innerHTML = beneficiaries.map(b => `
      <div class="col-md-6 col-lg-4">
        <div class="dash-chart-card h-100 d-flex flex-direction-column justify-content-between">
          <div>
            <div style="font-size:2rem; margin-bottom:0.75rem;">🏢</div>
            <h4 style="font-family:var(--font-heading); font-weight:700; color:var(--white); font-size:1.05rem; margin-bottom:0.25rem;">${b.name}</h4>
            <div style="font-size:0.7rem; color:var(--green-300); margin-bottom:1rem; text-transform:uppercase; font-weight:700;">${b.type}</div>
            
            <div style="font-size:var(--text-xs); color:var(--dash-text); margin-bottom:0.5rem;">
              <strong>Daily Target:</strong> ${b.capacity} meals/day
            </div>
            <div style="font-size:var(--text-xs); color:var(--dash-muted); margin-bottom:1rem;">
              📍 ${b.address}
            </div>
          </div>
          
          <div style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid rgba(255,255,255,0.06); padding-top:0.75rem; margin-top:1rem;">
            <span class="status-badge ${b.active ? 'status-accepted' : 'status-assigned'}">${b.active ? 'Active Feeding' : 'Inactive'}</span>
            <button class="btn btn-ghost btn-sm" onclick="editBeneficiary('${b.id}')" style="color:var(--green-400); font-size:0.75rem;"><i class="bi bi-pencil"></i> Edit</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  let editingId = null;

  window.openAddBeneficiaryModal = function() {
    editingId = null;
    document.getElementById('modalTitle').textContent = 'Add Beneficiary Center';
    document.getElementById('centerName').value = '';
    document.getElementById('centerType').value = 'Orphanage';
    document.getElementById('centerCapacity').value = '40';
    document.getElementById('centerAddress').value = '';
    document.getElementById('beneficiaryModal').classList.add('open');
  };

  window.editBeneficiary = function(id) {
    editingId = id;
    const center = beneficiaries.find(b => b.id === id);
    if (!center) return;

    document.getElementById('modalTitle').textContent = 'Edit Beneficiary Center';
    document.getElementById('centerName').value = center.name;
    document.getElementById('centerType').value = center.type;
    document.getElementById('centerCapacity').value = center.capacity;
    document.getElementById('centerAddress').value = center.address;
    document.getElementById('beneficiaryModal').classList.add('open');
  };

  window.closeBeneficiaryModal = function() {
    document.getElementById('beneficiaryModal').classList.remove('open');
  };

  window.saveBeneficiary = function() {
    const name = document.getElementById('centerName').value.trim();
    const type = document.getElementById('centerType').value;
    const capacity = parseInt(document.getElementById('centerCapacity').value) || 0;
    const address = document.getElementById('centerAddress').value.trim();

    if(!name) {
      showToast('Name Required', 'Please enter a name for the center.', 'warn');
      return;
    }

    if (editingId) {
      const bIndex = beneficiaries.findIndex(b => b.id === editingId);
      if(bIndex > -1) {
        beneficiaries[bIndex] = { ...beneficiaries[bIndex], name, type, capacity, address };
      }
      showToast('Center Updated', 'Beneficiary details updated successfully.', 'success');
    } else {
      beneficiaries.push({
        id: 'b' + (beneficiaries.length + 1),
        name,
        type,
        capacity,
        address,
        active: true
      });
      showToast('Center Added', 'New beneficiary center registered.', 'success');
    }
    
    closeBeneficiaryModal();
    renderBeneficiaries();
  };

  renderBeneficiaries();
</script>

</body>
</html>
