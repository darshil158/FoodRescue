<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Incoming Donations — NGO Dashboard</title>
  <meta name="robots" content="noindex">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/dashboard.css">
  <link rel="stylesheet" href="../../assets/css/animations.css">
</head>
<body class="dash-body">

<div id="toast-container"></div>

<!-- Sidebar Toggle (Mobile) -->
<button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
  <i class="bi bi-list"></i>
</button>

<!-- Sidebar -->
<aside class="dash-sidebar" id="dashSidebar">
  <div class="sidebar-header">
    <a href="../../index.html" class="sidebar-logo">
      <div class="logo-icon">🍃</div>
      <span>FoodRescue</span>
    </a>
    <div class="sidebar-user">
      <div class="sidebar-avatar">
        <i class="bi bi-building"></i>
      </div>
      <div>
        <div class="sidebar-user-name">Asha Foundation</div>
        <div class="sidebar-user-role">
          <span class="verified-dot"></span>
          <span>Registered NGO</span>
        </div>
      </div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="sidebar-section-label">Main Menu</div>
    <a href="index.html"    class="sidebar-nav-link"><i class="bi bi-grid-3x3-gap"></i> Overview</a>
    <a href="incoming.html" class="sidebar-nav-link active"><i class="bi bi-inbox"></i> Incoming <span class="nav-badge" id="incomingBadge">3</span></a>
    <a href="active.html"   class="sidebar-nav-link"><i class="bi bi-lightning-charge"></i> Active</a>
    <a href="history.html"  class="sidebar-nav-link"><i class="bi bi-clock-history"></i> History</a>
    <a href="beneficiaries.html" class="sidebar-nav-link"><i class="bi bi-people"></i> Beneficiaries</a>
    <div class="sidebar-section-label">Account</div>
    <a href="profile.html"  class="sidebar-nav-link"><i class="bi bi-person-circle"></i> Profile</a>
  </nav>

  <div class="sidebar-footer">
    <button class="sidebar-logout" data-logout>
      <i class="bi bi-box-arrow-left"></i> Logout
    </button>
  </div>
</aside>

<!-- Main Content -->
<main class="dash-main">
  <!-- Top Bar -->
  <div class="dash-topbar">
    <div>
      <div class="dash-greeting">Incoming Donations</div>
      <div class="dash-date" id="dateText"></div>
    </div>
  </div>

  <div class="dash-content">
    <div class="row">
      <div class="col-lg-12">
        <div class="dash-table-card">
          <div class="dash-table-header">
            <div class="dash-table-title">Incoming Listings Nearby</div>
            <span style="font-size:var(--text-xs); color:var(--dash-muted);">Updated in real-time</span>
          </div>

          <div style="padding: 1.5rem 0;" id="incomingDonationsContainer">
            <!-- Populated dynamically -->
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- Accept Handoff Window Modal -->
<div class="confirm-modal-overlay" id="acceptModal">
  <div class="confirm-modal">
    <h4 style="font-family:var(--font-heading); font-weight:700; margin-bottom:1rem;">Accept Food Donation</h4>
    <p style="font-size:var(--text-sm); color:var(--ink-500); margin-bottom:1.5rem;">
      Confirm your distribution capability and desired pickup window.
    </p>
    <div class="form-field">
      <label class="form-label" for="pickupWindow">Preferred Pickup Time Window</label>
      <select id="pickupWindow" class="form-input">
        <option value="asap">As soon as possible (&lt; 30 mins)</option>
        <option value="1h">Within 1 hour</option>
        <option value="2h">Within 2 hours</option>
      </select>
    </div>
    <div class="form-field">
      <label class="form-label" for="distributionServings">Target Servings to Feed</label>
      <input type="number" id="distributionServings" class="form-input" value="50">
    </div>
    <div style="display:flex; gap:1rem; margin-top:2rem;">
      <button class="btn btn-outline-green flex-1" onclick="closeAcceptModal()">Cancel</button>
      <button class="btn btn-green flex-1" onclick="confirmAccept()">Accept & Match Rider</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { initDashboardSidebar, initLogout, startExpiryTimer } from '../../assets/js/ui.js';
  import { showToast } from '../../assets/js/notifications.js';

  initDashboardSidebar();
  initLogout();
  document.getElementById('dateText').textContent = new Date().toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long' });

  // Dummy incoming food listings
  const dummyIncoming = [
    { id: 'inc1', foodName: 'Dal Makhani + Rice', category: 'veg', qty: '45 kg', servings: 60, expiresAt: new Date(Date.now() + 7200000).toISOString(), safetyScore: 88, restaurant: "Patel's Dhaba", dist: '1.2 km' },
    { id: 'inc2', foodName: 'Paneer Tikka Roll', category: 'veg', qty: '30 pieces', servings: 30, expiresAt: new Date(Date.now() + 4800000).toISOString(), safetyScore: 92, restaurant: 'Surat Premium Hotel', dist: '2.5 km' },
    { id: 'inc3', foodName: 'Chicken Biryani', category: 'non_veg', qty: '20 kg', servings: 40, expiresAt: new Date(Date.now() + 3600000).toISOString(), safetyScore: 79, restaurant: 'Al-Naimat Restaurant', dist: '3.1 km' }
  ];

  let selectedDonationId = null;

  function renderIncoming() {
    const container = document.getElementById('incomingDonationsContainer');
    if (dummyIncoming.length === 0) {
      container.innerHTML = `<div style="text-align:center; color:var(--dash-muted); padding:3rem;">No incoming donations available nearby at this time.</div>`;
      return;
    }

    container.innerHTML = dummyIncoming.map(d => `
      <div class="donation-feed-card mx-3 mb-3">
        <div class="donation-food-img">${d.category === 'veg' ? '🌿' : '🍖'}</div>
        <div style="flex:1;">
          <div class="donation-feed-title">${d.foodName}</div>
          <div class="donation-feed-meta">
            <span><i class="bi bi-box-seam"></i> ${d.qty}</span>
            <span>👥 ~${d.servings} people</span>
            <span>📍 ${d.restaurant} (${d.dist})</span>
          </div>
          <div><span class="status-badge status-posted">Ready</span></div>
          <div style="margin-top:8px;">
            <span class="donation-timer" id="timer_${d.id}">⏱️ Loading...</span>
          </div>
        </div>
        <div style="display:flex; flex-direction:column; gap:10px; min-width:140px; justify-content:center;">
          <div class="safety-score-mini mb-1">
            <span style="font-size:0.65rem; color:var(--dash-muted); margin-bottom: 2px; display:block;">Safety Check:</span>
            <div class="d-flex align-items-center gap-2">
              <div class="safety-score-bar" style="height:6px; flex:1;"><div class="safety-score-fill score-excellent" style="width:${d.safetyScore}%"></div></div>
              <strong style="font-size:0.75rem; color:var(--green-300);">${d.safetyScore}</strong>
            </div>
          </div>
          <button class="btn btn-green btn-sm" onclick="openAcceptModal('${d.id}', ${d.servings})"><i class="bi bi-check-circle"></i> Accept</button>
          <button class="btn btn-ghost btn-sm" style="font-size:0.7rem; color:var(--dash-muted);" onclick="declineIncoming('${d.id}')">Decline</button>
        </div>
      </div>
    `).join('');

    dummyIncoming.forEach(d => {
      const timerEl = document.getElementById('timer_' + d.id);
      if (timerEl) startExpiryTimer(timerEl, d.expiresAt);
    });

    document.getElementById('incomingBadge').textContent = dummyIncoming.length;
  }

  window.openAcceptModal = function(id, servings) {
    selectedDonationId = id;
    document.getElementById('distributionServings').value = servings;
    document.getElementById('acceptModal').classList.add('open');
  };

  window.closeAcceptModal = function() {
    document.getElementById('acceptModal').classList.remove('open');
  };

  window.confirmAccept = function() {
    // Remove listing from display list
    const index = dummyIncoming.findIndex(d => d.id === selectedDonationId);
    if(index > -1) {
      dummyIncoming.splice(index, 1);
    }
    closeAcceptModal();
    renderIncoming();
    showToast('✅ Accepted!', 'Pickup confirmed. A volunteer rider is mapping to this route now.', 'success');
  };

  window.declineIncoming = function(id) {
    const index = dummyIncoming.findIndex(d => d.id === id);
    if(index > -1) {
      dummyIncoming.splice(index, 1);
    }
    renderIncoming();
    showToast('Donation Declined', 'The offer has been sent back to the match engine.', 'info');
  };

  renderIncoming();
</script>

</body>
</html>
