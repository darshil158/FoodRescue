<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donation History — NGO Dashboard</title>
  <meta name="robots" content="noindex">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/dashboard.css">
  <link rel="stylesheet" href="../../assets/css/animations.css">
</head>
<body class="dash-body">

<div id="toast-container"></div>

<!-- Sidebar Toggle (Mobile) -->
<button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
  <i class="bi bi-list"></i>
</button>

<!-- Sidebar -->
<aside class="dash-sidebar" id="dashSidebar">
  <div class="sidebar-header">
    <a href="../../index.html" class="sidebar-logo">
      <div class="logo-icon">🍃</div>
      <span>FoodRescue</span>
    </a>
    <div class="sidebar-user">
      <div class="sidebar-avatar">
        <i class="bi bi-building"></i>
      </div>
      <div>
        <div class="sidebar-user-name">Asha Foundation</div>
        <div class="sidebar-user-role">
          <span class="verified-dot"></span>
          <span>Registered NGO</span>
        </div>
      </div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="sidebar-section-label">Main Menu</div>
    <a href="index.html"    class="sidebar-nav-link"><i class="bi bi-grid-3x3-gap"></i> Overview</a>
    <a href="incoming.html" class="sidebar-nav-link"><i class="bi bi-inbox"></i> Incoming <span class="nav-badge" id="incomingBadge">3</span></a>
    <a href="active.html"   class="sidebar-nav-link"><i class="bi bi-lightning-charge"></i> Active</a>
    <a href="history.html"  class="sidebar-nav-link active"><i class="bi bi-clock-history"></i> History</a>
    <a href="beneficiaries.html" class="sidebar-nav-link"><i class="bi bi-people"></i> Beneficiaries</a>
    <div class="sidebar-section-label">Account</div>
    <a href="profile.html"  class="sidebar-nav-link"><i class="bi bi-person-circle"></i> Profile</a>
  </nav>

  <div class="sidebar-footer">
    <button class="sidebar-logout" data-logout>
      <i class="bi bi-box-arrow-left"></i> Logout
    </button>
  </div>
</aside>

<!-- Main Content -->
<main class="dash-main">
  <!-- Top Bar -->
  <div class="dash-topbar">
    <div>
      <div class="dash-greeting">Received Donations Log</div>
      <div class="dash-date" id="dateText"></div>
    </div>
    <div class="dash-topbar-actions">
      <button class="btn btn-outline-green btn-sm" onclick="exportHistoryCSV()"><i class="bi bi-download"></i> Export CSV</button>
    </div>
  </div>

  <div class="dash-content">
    
    <!-- Filter Card -->
    <div class="dash-chart-card mb-4" style="padding:1rem;">
      <div style="display:flex; gap:1rem; flex-wrap:wrap; align-items:flex-end;">
        <div>
          <div class="form-label-dark" style="color:var(--dash-muted); font-size:.65rem; margin-bottom:4px;">FILTER BY RESTAURANT</div>
          <input type="text" id="filterRestaurant" placeholder="e.g. Patel's Dhaba" style="background:rgba(255,255,255,0.06); border:1.5px solid rgba(255,255,255,0.1); border-radius:var(--radius-md); padding:8px 12px; color:var(--white); font-size:var(--text-sm); outline:none;">
        </div>
        <button class="btn btn-green btn-sm" onclick="applyNgoFilters()"><i class="bi bi-funnel"></i> Apply Filter</button>
        <button class="btn btn-ghost btn-sm" onclick="clearNgoFilters()" style="color:var(--dash-muted);">Clear</button>
      </div>
    </div>

    <!-- History Table -->
    <div class="dash-table-card">
      <div class="dash-table-header">
        <div class="dash-table-title">Delivery History Log</div>
        <span style="font-size:var(--text-xs); color:var(--dash-muted);" id="ngoRecordCount">0 records</span>
      </div>
      <div style="overflow-x:auto;">
        <table class="dash-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Food Name</th>
              <th>Quantity</th>
              <th>Servings</th>
              <th>Donor</th>
              <th>Rider</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="ngoHistoryTbody">
            <!-- Rendered by JS -->
          </tbody>
        </table>
      </div>
    </div>

  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { initDashboardSidebar, initLogout } from '../../assets/js/ui.js';
  
  initDashboardSidebar();
  initLogout();
  document.getElementById('dateText').textContent = new Date().toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long' });

  const historyData = [
    { date: '25 Jun 2025', food: 'Veg Pulav & Curry', qty: '40 kg', servings: 80, restaurant: "Patel's Dhaba", volunteer: 'Ramesh Kumar', status: 'completed' },
    { date: '24 Jun 2025', food: 'Samosa Chat Packets', qty: '50 packets', servings: 50, restaurant: 'Golden Bakery', volunteer: 'Priya Singh', status: 'completed' },
    { date: '22 Jun 2025', food: 'Khichdi Kadhi', qty: '80 kg', servings: 120, restaurant: 'Imperial Hotel', volunteer: 'Ramesh Kumar', status: 'completed' },
    { date: '20 Jun 2025', food: 'Mix Veg Salad', qty: '10 kg', servings: 25, restaurant: "Patel's Dhaba", volunteer: 'Suresh Mehta', status: 'completed' }
  ];

  function renderHistory(data) {
    const tbody = document.getElementById('ngoHistoryTbody');
    tbody.innerHTML = data.map(r => `
      <tr>
        <td style="font-size:var(--text-xs); color:var(--dash-muted);">${r.date}</td>
        <td><div class="food-name">${r.food}</div></td>
        <td>${r.qty}</td>
        <td style="color:var(--green-300); font-weight:600;">${r.servings}</td>
        <td>${r.restaurant}</td>
        <td style="font-size:var(--text-xs); color:var(--dash-muted);">${r.volunteer}</td>
        <td><span class="status-badge status-completed">${r.status}</span></td>
      </tr>
    `).join('');

    document.getElementById('ngoRecordCount').textContent = `${data.length} records`;
  }

  window.applyNgoFilters = function() {
    const filterVal = document.getElementById('filterRestaurant').value.toLowerCase().trim();
    if (!filterVal) {
      renderHistory(historyData);
      return;
    }
    const filtered = historyData.filter(h => h.restaurant.toLowerCase().includes(filterVal));
    renderHistory(filtered);
  };

  window.clearNgoFilters = function() {
    document.getElementById('filterRestaurant').value = '';
    renderHistory(historyData);
  };

  window.exportHistoryCSV = function() {
    const header = ['Date', 'Food Name', 'Quantity', 'Servings', 'Donor', 'Rider', 'Status'];
    const rows = [header, ...historyData.map(h => [h.date, h.food, h.qty, h.servings, h.restaurant, h.volunteer, h.status])];
    const csvContent = rows.map(r => r.join(',')).join('\n');
    const blob = new Blob([csvContent], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'ngo_delivery_history.csv';
    a.click();
  };

  renderHistory(historyData);
</script>

</body>
</html>
