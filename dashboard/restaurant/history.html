<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donation History — FoodRescue Restaurant</title>
  <meta name="robots" content="noindex">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/dashboard.css">
  <link rel="stylesheet" href="../../assets/css/animations.css">
</head>
<body class="dash-body">
<div id="toast-container"></div>
<button class="sidebar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
<aside class="dash-sidebar" id="dashSidebar">
  <div class="sidebar-header">
    <a href="../../index.html" class="sidebar-logo"><div class="logo-icon">🍃</div><span>FoodRescue</span></a>
    <div class="sidebar-user"><div class="sidebar-avatar"><i class="bi bi-building"></i></div><div><div class="sidebar-user-name">Patel's Dhaba</div><div class="sidebar-user-role"><span class="verified-dot"></span> Verified Donor</div></div></div>
  </div>
  <nav class="sidebar-nav">
    <div class="sidebar-section-label">Main Menu</div>
    <a href="index.html"   class="sidebar-nav-link"><i class="bi bi-grid-3x3-gap"></i> Overview</a>
    <a href="post.html"    class="sidebar-nav-link"><i class="bi bi-plus-circle"></i> Post Donation</a>
    <a href="active.html"  class="sidebar-nav-link"><i class="bi bi-lightning-charge"></i> Active</a>
    <a href="history.html" class="sidebar-nav-link active"><i class="bi bi-clock-history"></i> History</a>
    <a href="impact.html"  class="sidebar-nav-link"><i class="bi bi-graph-up-arrow"></i> Impact</a>
    <div class="sidebar-section-label">Account</div>
    <a href="profile.html" class="sidebar-nav-link"><i class="bi bi-person-circle"></i> Profile</a>
  </nav>
  <div class="sidebar-footer"><button class="sidebar-logout" data-logout><i class="bi bi-box-arrow-left"></i> Logout</button></div>
</aside>
<main class="dash-main">
  <div class="dash-topbar">
    <div><div class="dash-greeting">Donation History</div><div class="dash-date" id="dateText"></div></div>
    <div class="dash-topbar-actions">
      <button class="btn btn-outline-green btn-sm" onclick="exportCSV()"><i class="bi bi-download"></i> Export CSV</button>
      <a href="post.html" class="btn btn-primary btn-sm"><i class="bi bi-plus-circle"></i> Post New</a>
    </div>
  </div>
  <div class="dash-content">

    <!-- Filters -->
    <div class="dash-chart-card mb-4" style="padding:1rem;">
      <div style="display:flex;gap:1rem;flex-wrap:wrap;align-items:flex-end;">
        <div>
          <div class="form-label-dark" style="color:var(--dash-muted);font-size:.65rem;margin-bottom:4px;">DATE FROM</div>
          <input type="date" id="filterFrom" style="background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.1);border-radius:var(--radius-md);padding:8px 12px;color:var(--white);font-size:var(--text-sm);outline:none;">
        </div>
        <div>
          <div class="form-label-dark" style="color:var(--dash-muted);font-size:.65rem;margin-bottom:4px;">DATE TO</div>
          <input type="date" id="filterTo" style="background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.1);border-radius:var(--radius-md);padding:8px 12px;color:var(--white);font-size:var(--text-sm);outline:none;">
        </div>
        <div>
          <div class="form-label-dark" style="color:var(--dash-muted);font-size:.65rem;margin-bottom:4px;">STATUS</div>
          <select id="filterStatus" style="background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.1);border-radius:var(--radius-md);padding:8px 12px;color:var(--white);font-size:var(--text-sm);outline:none;">
            <option value="">All Statuses</option>
            <option value="completed">Completed</option>
            <option value="expired">Expired</option>
            <option value="delivering">Delivering</option>
          </select>
        </div>
        <button class="btn btn-green btn-sm" onclick="applyFilters()"><i class="bi bi-funnel"></i> Apply</button>
        <button class="btn btn-ghost btn-sm" onclick="clearFilters()" style="color:var(--dash-muted);">Clear</button>
      </div>
    </div>

    <div class="dash-table-card">
      <div class="dash-table-header">
        <div class="dash-table-title">All Donations</div>
        <span style="font-size:var(--text-xs);color:var(--dash-muted);" id="recordCount">42 records</span>
      </div>
      <div style="overflow-x:auto;">
        <table class="dash-table" id="historyTable">
          <thead><tr>
            <th>Date</th>
            <th>Food Name</th>
            <th>Category</th>
            <th>Quantity</th>
            <th>Meals</th>
            <th>NGO</th>
            <th>Status</th>
            <th>Impact</th>
          </tr></thead>
          <tbody id="historyTbody"></tbody>
        </table>
      </div>
    </div>

  </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { initDashboardSidebar, initLogout } from '../../assets/js/ui.js';
  initDashboardSidebar(); initLogout();
  document.getElementById('dateText').textContent = new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'});

  const history = [
    { date:'28 Jun 2025', name:'Veg Biryani', cat:'veg', qty:'60 kg', meals:80, ngo:'Asha Foundation', status:'completed', co2:'108 kg' },
    { date:'27 Jun 2025', name:'Dal Makhani', cat:'veg', qty:'30 kg', meals:40, ngo:'Seva Ashram', status:'completed', co2:'54 kg' },
    { date:'26 Jun 2025', name:'Paneer Tikka', cat:'veg', qty:'15 kg', meals:20, ngo:'Annapurna Trust', status:'completed', co2:'27 kg' },
    { date:'25 Jun 2025', name:'Bread Rolls', cat:'veg', qty:'25 boxes', meals:50, ngo:'Asha Foundation', status:'completed', co2:'—' },
    { date:'24 Jun 2025', name:'Chicken Curry', cat:'non_veg', qty:'40 kg', meals:55, ngo:'Relief Center', status:'completed', co2:'72 kg' },
    { date:'23 Jun 2025', name:'Mixed Salad', cat:'vegan', qty:'10 kg', meals:15, ngo:'—', status:'expired', co2:'—' },
    { date:'22 Jun 2025', name:'Khichdi', cat:'veg', qty:'50 kg', meals:70, ngo:'Asha Foundation', status:'completed', co2:'90 kg' }
  ];

  function renderHistory(data) {
    const tbody = document.getElementById('historyTbody');
    tbody.innerHTML = data.map(r => `
      <tr>
        <td style="font-size:var(--text-xs);color:var(--dash-muted);">${r.date}</td>
        <td><div class="food-name">${r.name}</div></td>
        <td><span class="status-badge ${r.cat==='veg'?'status-accepted':r.cat==='vegan'?'status-matched':'status-assigned'}">${r.cat==='veg'?'🌿 Veg':r.cat==='vegan'?'🌱 Vegan':'🍖 Non-Veg'}</span></td>
        <td style="color:var(--dash-text);">${r.qty}</td>
        <td style="color:var(--green-300);font-weight:600;">${r.meals}</td>
        <td style="font-size:var(--text-xs);color:var(--dash-muted);">${r.ngo}</td>
        <td><span class="status-badge status-${r.status}">${r.status}</span></td>
        <td style="font-size:var(--text-xs);color:var(--saffron-400);">${r.co2}</td>
      </tr>
    `).join('');
    document.getElementById('recordCount').textContent = `${data.length} records`;
  }
  renderHistory(history);

  window.applyFilters = function() {
    const status = document.getElementById('filterStatus').value;
    renderHistory(status ? history.filter(r => r.status === status) : history);
  };
  window.clearFilters = function() {
    document.getElementById('filterStatus').value = '';
    renderHistory(history);
  };
  window.exportCSV = function() {
    const rows = [['Date','Food Name','Category','Quantity','Meals','NGO','Status','CO2']];
    history.forEach(r => rows.push([r.date,r.name,r.cat,r.qty,r.meals,r.ngo,r.status,r.co2]));
    const csv = rows.map(r => r.join(',')).join('\n');
    const blob = new Blob([csv], { type:'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'foodrescue_donations.csv'; a.click();
  };
</script>
</body>
</html>
