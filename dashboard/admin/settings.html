<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — Admin Dashboard</title>
  <meta name="robots" content="noindex">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/dashboard.css">
  <link rel="stylesheet" href="../../assets/css/animations.css">
</head>
<body class="dash-body">

<div id="toast-container"></div>

<!-- Sidebar Toggle (Mobile) -->
<button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
  <i class="bi bi-list"></i>
</button>

<!-- Sidebar -->
<aside class="dash-sidebar" id="dashSidebar">
  <div class="sidebar-header">
    <a href="../../index.html" class="sidebar-logo">
      <div class="logo-icon">🍃</div>
      <span>FoodRescue</span>
    </a>
    <div class="sidebar-user">
      <div class="sidebar-avatar" style="background:var(--emergency);"><i class="bi bi-shield-fill"></i></div>
      <div><div class="sidebar-user-name">Platform Admin</div><div class="sidebar-user-role"><span class="verified-dot"></span> Super Admin</div></div>
    </div>
  </div>
  <nav class="sidebar-nav">
    <div class="sidebar-section-label">Control Panel</div>
    <a href="index.html"         class="sidebar-nav-link"><i class="bi bi-grid-3x3-gap"></i> Overview</a>
    <a href="verifications.html" class="sidebar-nav-link"><i class="bi bi-shield-check"></i> Verifications <span class="nav-badge" id="pendingBadge">0</span></a>
    <a href="users.html"         class="sidebar-nav-link"><i class="bi bi-people"></i> All Users</a>
    <a href="donations.html"     class="sidebar-nav-link"><i class="bi bi-box-seam"></i> All Donations</a>
    <a href="reports.html"       class="sidebar-nav-link"><i class="bi bi-flag"></i> Reports</a>
    <a href="emergency.html"     class="sidebar-nav-link"><i class="bi bi-exclamation-triangle"></i> Emergency Mode</a>
    <a href="analytics.html"     class="sidebar-nav-link"><i class="bi bi-graph-up-arrow"></i> Analytics</a>
    <a href="settings.html"      class="sidebar-nav-link active"><i class="bi bi-gear"></i> Settings</a>
    <div class="sidebar-section-label">Account</div>
    <a href="profile.html"       class="sidebar-nav-link"><i class="bi bi-person-circle"></i> Admin Profile</a>
  </nav>

  <div class="sidebar-footer">
    <button class="sidebar-logout" data-logout>
      <i class="bi bi-box-arrow-left"></i> Logout
    </button>
  </div>
</aside>

<!-- Main Content -->
<main class="dash-main">
  <!-- Top Bar -->
  <div class="dash-topbar">
    <div>
      <div class="dash-greeting">Global Platform Settings</div>
      <div class="dash-date" id="dateText"></div>
    </div>
    <div class="dash-topbar-actions">
      <button class="btn btn-primary btn-sm" onclick="saveAdminSettings()"><i class="bi bi-check-circle"></i> Save Settings</button>
    </div>
  </div>

  <div class="dash-content">
    <div class="row g-4">
      
      <div class="col-lg-12">
        <div class="dash-chart-card">
          <div class="dash-chart-title">Dispatch Engine Parameters</div>
          <div class="row g-3 mb-4">
            <div class="col-md-6">
              <label class="form-label-dark">Default Match Search Radius (km)</label>
              <input type="number" class="form-input-dark" value="5">
            </div>
            <div class="col-md-6">
              <label class="form-label-dark">Max Match Expansion Radius (km)</label>
              <input type="number" class="form-input-dark" value="15">
            </div>
            <div class="col-md-6">
              <label class="form-label-dark">FSSAI Safety Reject Score Threshold</label>
              <input type="number" class="form-input-dark" value="50">
            </div>
            <div class="col-md-6">
              <label class="form-label-dark">Rider Accept Window Timeout (mins)</label>
              <input type="number" class="form-input-dark" value="3">
            </div>
          </div>

          <div class="dash-chart-title">Automated Notification Routing</div>
          <div style="display:flex; flex-direction:column; gap:10px;">
            <label style="display:flex; align-items:center; gap:10px; font-size:var(--text-sm); color:var(--dash-text); cursor:pointer;">
              <input type="checkbox" checked style="accent-color:var(--green-500);"> Auto-dispatch alerts on high priority listings
            </label>
            <label style="display:flex; align-items:center; gap:10px; font-size:var(--text-sm); color:var(--dash-text); cursor:pointer;">
              <input type="checkbox" checked style="accent-color:var(--green-500);"> Require photo upload check for FSSAI verification
            </label>
            <label style="display:flex; align-items:center; gap:10px; font-size:var(--text-sm); color:var(--dash-text); cursor:pointer;">
              <input type="checkbox" style="accent-color:var(--green-500);"> Send daily system logs email summary to admins
            </label>
          </div>
        </div>
      </div>

    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { initDashboardSidebar, initLogout } from '../../assets/js/ui.js';
  import { showToast } from '../../assets/js/notifications.js';

  initDashboardSidebar();
  initLogout();
  document.getElementById('dateText').textContent = new Date().toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long' });

  window.saveAdminSettings = function() {
    showToast('Settings Saved', 'Global platform variables updated.', 'success');
  };
</script>

</body>
</html>
