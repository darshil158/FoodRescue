<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Donations — Admin Dashboard</title>
  <meta name="robots" content="noindex">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/dashboard.css">
  <link rel="stylesheet" href="../../assets/css/animations.css">
</head>
<body class="dash-body">

<div id="toast-container"></div>

<!-- Sidebar Toggle (Mobile) -->
<button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
  <i class="bi bi-list"></i>
</button>

<!-- Sidebar -->
<aside class="dash-sidebar" id="dashSidebar">
  <div class="sidebar-header">
    <a href="../../index.html" class="sidebar-logo">
      <div class="logo-icon">🍃</div>
      <span>FoodRescue</span>
    </a>
    <div class="sidebar-user">
      <div class="sidebar-avatar" style="background:var(--emergency);"><i class="bi bi-shield-fill"></i></div>
      <div><div class="sidebar-user-name">Platform Admin</div><div class="sidebar-user-role"><span class="verified-dot"></span> Super Admin</div></div>
    </div>
  </div>
  <nav class="sidebar-nav">
    <div class="sidebar-section-label">Control Panel</div>
    <a href="index.html"         class="sidebar-nav-link"><i class="bi bi-grid-3x3-gap"></i> Overview</a>
    <a href="verifications.html" class="sidebar-nav-link"><i class="bi bi-shield-check"></i> Verifications <span class="nav-badge" id="pendingBadge">0</span></a>
    <a href="users.html"         class="sidebar-nav-link"><i class="bi bi-people"></i> All Users</a>
    <a href="donations.html"     class="sidebar-nav-link active"><i class="bi bi-box-seam"></i> All Donations</a>
    <a href="reports.html"       class="sidebar-nav-link"><i class="bi bi-flag"></i> Reports</a>
    <a href="emergency.html"     class="sidebar-nav-link"><i class="bi bi-exclamation-triangle"></i> Emergency Mode</a>
    <a href="analytics.html"     class="sidebar-nav-link"><i class="bi bi-graph-up-arrow"></i> Analytics</a>
    <a href="settings.html"      class="sidebar-nav-link"><i class="bi bi-gear"></i> Settings</a>
    <div class="sidebar-section-label">Account</div>
    <a href="profile.html"       class="sidebar-nav-link"><i class="bi bi-person-circle"></i> Admin Profile</a>
  </nav>

  <div class="sidebar-footer">
    <button class="sidebar-logout" data-logout>
      <i class="bi bi-box-arrow-left"></i> Logout
    </button>
  </div>
</aside>

<!-- Main Content -->
<main class="dash-main">
  <!-- Top Bar -->
  <div class="dash-topbar">
    <div>
      <div class="dash-greeting">Global Donations Registry</div>
      <div class="dash-date" id="dateText"></div>
    </div>
  </div>

  <div class="dash-content">
    
    <!-- Filter Bar -->
    <div class="dash-chart-card mb-4" style="padding:1rem;">
      <div style="display:flex; gap:1rem; flex-wrap:wrap; align-items:flex-end;">
        <div>
          <div class="form-label-dark" style="color:var(--dash-muted); font-size:.65rem; margin-bottom:4px;">FILTER BY STATUS</div>
          <select id="statusFilter" onchange="filterDonations()" style="background:rgba(255,255,255,0.06); border:1.5px solid rgba(255,255,255,0.1); border-radius:var(--radius-md); padding:8px 12px; color:var(--white); font-size:var(--text-sm); outline:none;">
            <option value="">All Statuses</option>
            <option value="posted">Posted / Ready</option>
            <option value="accepted">Accepted / NGO Matched</option>
            <option value="delivering">En Route</option>
            <option value="completed">Completed</option>
            <option value="expired">Expired</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Donations Table -->
    <div class="dash-table-card">
      <div class="dash-table-header">
        <div class="dash-table-title">All Platform Transactions</div>
      </div>
      
      <div style="overflow-x:auto;">
        <table class="dash-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Food Item</th>
              <th>Quantity</th>
              <th>Donor</th>
              <th>Matched NGO</th>
              <th>Rider Assigned</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="donationsTbody">
            <!-- Populated dynamically -->
          </tbody>
        </table>
      </div>
    </div>

  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { initDashboardSidebar, initLogout } from '../../assets/js/ui.js';

  initDashboardSidebar();
  initLogout();
  document.getElementById('dateText').textContent = new Date().toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long' });

  const donationsList = [
    { id: 'DON-900', food: 'Veg Biryani Extra Packets', qty: '60 kg', donor: "Patel's Hotel", ngo: 'Asha Foundation', rider: 'Ramesh Kumar', status: 'delivering' },
    { id: 'DON-899', food: 'Paneer Masala Gravy', qty: '15 kg', donor: 'Imperial Hotel', ngo: 'Asha Foundation', rider: 'Ramesh Kumar', status: 'completed' },
    { id: 'DON-898', food: 'Fresh Breads & Cakes', qty: '12 boxes', donor: 'Golden Bakery', ngo: 'Seva Ashram', rider: 'Priya Singh', status: 'accepted' },
    { id: 'DON-897', food: 'Mix Veg Salad', qty: '10 kg', donor: "Patel's Dhaba", ngo: '—', rider: '—', status: 'expired' },
    { id: 'DON-896', food: 'Dal Makhani + Rice', qty: '45 kg', donor: "Patel's Dhaba", ngo: '—', rider: '—', status: 'posted' }
  ];

  function renderDonations(list) {
    const tbody = document.getElementById('donationsTbody');
    tbody.innerHTML = list.map(d => `
      <tr>
        <td class="font-monospace">${d.id}</td>
        <td><div class="food-name">${d.food}</div></td>
        <td>${d.qty}</td>
        <td>${d.donor}</td>
        <td>${d.ngo}</td>
        <td>${d.rider}</td>
        <td><span class="status-badge status-${d.status}">${d.status.replace(/_/g, ' ')}</span></td>
      </tr>
    `).join('');
  }

  window.filterDonations = function() {
    const statusVal = document.getElementById('statusFilter').value;
    const filtered = statusVal ? donationsList.filter(d => d.status === statusVal) : donationsList;
    renderDonations(filtered);
  };

  renderDonations(donationsList);
</script>

</body>
</html>
